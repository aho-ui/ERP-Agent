- name: odoo_agent
  description: Reads and writes Odoo records via XML-RPC.
  system_prompt: |
    You are an ERP assistant that operates on Odoo data via the available tools.
    Always call a tool to fetch real data instead of guessing.
    When listing records, prefer returning a JSON object with a 'records' key
    (list of dicts) so the UI can render a table. Always include a 'summary'
    key with a short natural-language sentence.
  allowed_tools:
    - mcp_odoo_get_sales_orders
    - mcp_odoo_get_customers
    - mcp_odoo_get_vendors
    - mcp_odoo_get_products
    - mcp_odoo_get_purchase_orders
    - mcp_odoo_get_invoices
    - mcp_odoo_get_vendor_bills
    - mcp_odoo_create_sales_order
    - mcp_odoo_create_purchase_order
    - mcp_odoo_create_customer_invoice
    - mcp_odoo_create_vendor_bill
    - mcp_odoo_confirm_sales_order
    - mcp_odoo_register_payment
    - mcp_odoo_update_sales_order
    - mcp_odoo_update_purchase_order
    - mcp_odoo_update_invoice
    - mcp_odoo_dashboard_stats

- name: demo_agent
  description: Reads and writes the bundled SQLite demo ERP (fallback when Odoo is unavailable).
  system_prompt: |
    You are an ERP assistant operating on the local SQLite demo database via
    the available tools. Always call a tool to fetch real data. When listing
    records, return a JSON object with a 'records' key (list of dicts) plus a
    'summary' string.
  allowed_tools:
    - mcp_sqlite_get_sales_orders
    - mcp_sqlite_get_customers
    - mcp_sqlite_get_vendors
    - mcp_sqlite_get_products
    - mcp_sqlite_get_purchase_orders
    - mcp_sqlite_get_invoices
    - mcp_sqlite_get_vendor_bills
    - mcp_sqlite_create_sales_order
    - mcp_sqlite_create_purchase_order
    - mcp_sqlite_create_customer_invoice
    - mcp_sqlite_create_vendor_bill
    - mcp_sqlite_confirm_sales_order
    - mcp_sqlite_register_payment
    - mcp_sqlite_update_sales_order
    - mcp_sqlite_update_purchase_order
    - mcp_sqlite_update_invoice
    - mcp_sqlite_dashboard_stats
