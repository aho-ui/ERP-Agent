services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=
      - ODOO_URL=http://host.docker.internal:8069
      - ODOO_DB=odoo_dev_18
      - ODOO_USER=admin
      - ODOO_PASSWORD=admin
    volumes:
      - ${HOME}/.nanobot:/root/.nanobot
      - nanobot-db:/app/dbdata
      - ./demo.db:/app/demo.db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  nanobot-db:
